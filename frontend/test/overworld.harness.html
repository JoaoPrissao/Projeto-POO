<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Harness — overworld side-scroll</title>
  <style>
    body { font-family: monospace; background:#14111c; color:#ece6f5; padding:16px; }
    .ok { color:#5be08a; } .falhou { color:#e23b4e; }
    h1 { font-size:1.1rem; } li { margin:2px 0; }
  </style>
</head>
<body>
  <h1>Harness do overworld</h1>
  <div id="resumo">rodando…</div>
  <ul id="casos"></ul>

  <script src="../js/overworld.js"></script>
  <script>
  (function () {
    "use strict";
    const OW = window.Overworld;
    const V = OW.CONFIG.VEL;
    const casos = [];
    function checar(nome, atual, esperado) {
      const ok = JSON.stringify(atual) === JSON.stringify(esperado);
      casos.push({ nome, ok, atual, esperado });
    }
    function perto(nome, atual, esperado, tol) {
      const ok = Math.abs(atual - esperado) <= (tol || 0.001);
      casos.push({ nome, ok, atual, esperado });
    }

    const VENUES = [
      { id: "bar",   x: 400,  nome: "Bar do Zé" },
      { id: "arena", x: 1500, nome: "Arena" },
    ];
    const ITENS = [{ id: "i1", x: 250, tipo: "energetico" }];
    // MAP-02 (Phase 1): NPCs usados nos casos de harness.
    const NPCS_HARNESS = [
      { id: "npc1", x: 600,  nome: "Roadie", fala: "Ola!", item: "bandana_sortuda", dado: false },
      { id: "npc2", x: 1200, nome: "Fa",     fala: "Oi!",  item: "palheta_de_ouro", dado: false },
    ];

    function novoMundo() {
      const entrou = [], coletou = [];
      const mundo = OW.criarMundo({
        agora: () => 0, agendarFrame: () => {},     // loop não usado (dirigimos passo())
        ctx: null, inicioX: 60,
        venues: VENUES, itens: ITENS,
        aoEntrar: (v) => entrou.push(v.id),
        aoColetar: (it) => coletou.push(it.id),
      });
      return { mundo, entrou, coletou };
    }

    // Helper para testes MAP-02: mundo com NPCs e callback aoNpc.
    function novoMundoComNpcs(overrides) {
      const aoNpcChamados = [];
      const mundo = OW.criarMundo({
        agora: () => 0, agendarFrame: () => {}, ctx: null, inicioX: 60,
        venues: VENUES, itens: ITENS,
        npcs: NPCS_HARNESS.map((n) => ({ ...n })),
        aoNpc: (n) => aoNpcChamados.push(n.id),
        ...(overrides || {}),
      });
      return { mundo, aoNpcChamados };
    }

    // ── 1. Anda pra direita (A/D) ──────────────────────────────────────────────
    {
      const { mundo } = novoMundo();
      mundo.pressionar("d");
      mundo.passo(500);
      perto("anda: x = inicio + VEL*dt", mundo.estado.banda.x, 60 + V * 500, 0.001);
      checar("anda: direcao = +1", mundo.estado.direcao, 1);
    }

    // ── 2. Para ao soltar a tecla ──────────────────────────────────────────────
    {
      const { mundo } = novoMundo();
      mundo.pressionar("d"); mundo.passo(500);
      const x1 = mundo.estado.banda.x;
      mundo.soltar("d"); mundo.passo(500);
      checar("para: direcao = 0", mundo.estado.direcao, 0);
      perto("para: x congelado", mundo.estado.banda.x, x1, 0.001);
    }

    // ── 3. Câmera segue na horizontal ──────────────────────────────────────────
    {
      const { mundo } = novoMundo();
      // Mundo largo (arena em 1500) → câmera tem pra onde rolar.
      mundo.pressionar("d"); mundo.passo(2000);
      const e = mundo.estado;
      const centro = e.banda.x + OW.CONFIG.TAM_BANDA / 2;
      perto("camera: segue o centro da banda", e.camera_x, centro - OW.CONFIG.LARGURA / 2, 0.001);
    }

    // ── 4. Câmera não passa de 0 perto do início ───────────────────────────────
    {
      const { mundo } = novoMundo();
      mundo.passo(16);
      checar("camera: clamp em 0 no começo", mundo.estado.camera_x, 0);
    }

    // ── 5. Coleta item ao sobrepor ─────────────────────────────────────────────
    {
      const { mundo, coletou } = novoMundo();
      // item em x=250; anda até o centro da banda cobrir.
      mundo.pressionar("d"); mundo.passo(900);   // x ≈ 60+198=258, centro ≈ 280
      checar("item: coletou i1", coletou, ["i1"]);
      checar("item: marcado coletado no estado",
        mundo.estado.itens.find((i) => i.id === "i1").coletado, true);
    }

    // ── 6. Entra na venue com W quando perto ───────────────────────────────────
    {
      const { mundo, entrou } = novoMundo();
      mundo.pressionar("d"); mundo.passo(1600);  // centro ≈ 82+352=434, perto do bar(400)
      checar("venue: bar detectada perto", mundo.estado.venue_perto, "bar");
      mundo.pressionar("w");
      checar("venue: W entrou no bar", entrou, ["bar"]);
    }

    // ── 7. W longe de qualquer porta não faz nada ──────────────────────────────
    {
      const { mundo, entrou } = novoMundo();
      mundo.pressionar("w");                     // ainda no início, longe do bar
      checar("venue: W longe não entra", entrou, []);
    }

    // ── 8. Venue concluída não dispara de novo ─────────────────────────────────
    {
      const { mundo, entrou } = novoMundo();
      mundo.marcarVenueConcluida("bar");
      mundo.pressionar("d"); mundo.passo(1600);
      checar("venue: concluída some do venue_perto", mundo.estado.venue_perto, null);
      mundo.pressionar("w");
      checar("venue: concluída não re-entra", entrou, []);
    }

    // ── 9. Loop real (agora/agendarFrame injetados) integra o movimento ────────
    {
      let T = 0, pendente = null;
      const entrou = [];
      const mundo = OW.criarMundo({
        agora: () => T,
        agendarFrame: (cb) => { pendente = cb; },
        ctx: null, inicioX: 60, venues: VENUES, itens: [],
        aoEntrar: (v) => entrou.push(v.id),
      });
      mundo.iniciar();                 // agenda 1ª frame
      mundo.pressionar("d");
      function frame(ms) { T += ms; const cb = pendente; pendente = null; if (cb) cb(); }
      frame(0);                        // 1ª frame: dt=0 (estabelece ultimoT)
      for (let i = 0; i < 10; i++) frame(100);   // 1000ms andando
      perto("loop: integrou ~VEL*1000", mundo.estado.banda.x, 60 + V * 1000, 0.5);
      mundo.parar();
      checar("loop: parar zera rodando", mundo.rodando, false);
    }

    // ── 10. inicioX posiciona a banda (retomar posição entre batalhas) ─────────
    {
      const mundo = OW.criarMundo({
        agora: () => 0, agendarFrame: () => {}, ctx: null,
        inicioX: 300, venues: VENUES, itens: [],
      });
      checar("inicioX: banda começa na posição lembrada", mundo.estado.banda.x, 300);
    }

    // ── Loja no mapa (F3.8): W perto do 🏪 chama aoLoja, longe não ─────────────
    {
      const lojaAbriu = [], entrou = [];
      const mundo = OW.criarMundo({
        agora: () => 0, agendarFrame: () => {}, ctx: null,
        inicioX: 700 - OW.CONFIG.TAM_BANDA / 2,    // centro da banda em x=700
        venues: VENUES, itens: [], loja: { x: 700 },
        aoEntrar: (v) => entrou.push(v.id),
        aoLoja: () => lojaAbriu.push(1),
      });
      checar("loja: estado expõe loja_perto", mundo.estado.loja_perto, true);
      mundo.interagir();
      checar("loja: W perto da loja chama aoLoja", lojaAbriu.length, 1);
      checar("loja: não entra em venue por engano", entrou.length, 0);
    }
    {
      const lojaAbriu = [];
      const mundo = OW.criarMundo({
        agora: () => 0, agendarFrame: () => {}, ctx: null,
        inicioX: 60, venues: VENUES, itens: [], loja: { x: 700 },
        aoLoja: () => lojaAbriu.push(1),
      });
      checar("loja: longe não abre", mundo.estado.loja_perto, false);
      mundo.interagir();
      checar("loja: W longe da loja não chama aoLoja", lojaAbriu.length, 0);
    }

    // ── MAP-02: NPCs e balão de fala (Phase 1) ─────────────────────────────────

    // NPC perto → npc_perto correto; W chama aoNpc
    {
      // npc1 em x=600; inicioX=560 → centro = 560+22=582; |582-600|=18 <= 56 → perto
      const { mundo, aoNpcChamados } = novoMundoComNpcs({ inicioX: 560 });
      checar("npc: npc_perto quando dentro do alcance", mundo.estado.npc_perto, "npc1");
      mundo.pressionar("w");
      checar("npc: W chama aoNpc", aoNpcChamados, ["npc1"]);
    }

    // NPC longe → W não chama aoNpc
    {
      const { mundo, aoNpcChamados } = novoMundoComNpcs(); // inicioX=60, npc1 em 600 (longe)
      checar("npc: npc_perto null quando longe", mundo.estado.npc_perto, null);
      mundo.pressionar("w");
      checar("npc: W longe nao chama aoNpc", aoNpcChamados, []);
    }

    // NPC já dado → npc_perto ainda o detecta (repete fala)
    {
      const npcsComDado = NPCS_HARNESS.map((n) => n.id === "npc1" ? { ...n, dado: true } : { ...n });
      const { mundo } = novoMundoComNpcs({ inicioX: 560, npcs: npcsComDado });
      checar("npc: npc_perto com dado=true ainda retorna npc", mundo.estado.npc_perto, "npc1");
      const n1 = mundo.estado.npcs.find((n) => n.id === "npc1");
      checar("npc: dado=true preservado no estado", n1.dado, true);
    }

    // Balão aberto → passo não move a banda
    {
      const { mundo } = novoMundoComNpcs();
      mundo.pressionar("d");
      const x0 = mundo.estado.banda.x;
      mundo.abrirBalao("Texto teste", "subtexto");
      checar("balao: balao_aberto=true apos abrirBalao", mundo.estado.balao_aberto, true);
      mundo.passo(500);  // D-16: banda não deve se mover
      checar("balao: passo nao move banda com balao aberto", mundo.estado.banda.x, x0);
    }

    // W fecha balão (não chama aoNpc quando balão aberto)
    {
      const { mundo, aoNpcChamados } = novoMundoComNpcs({ inicioX: 560 });
      mundo.abrirBalao("fala", "sub");
      mundo.pressionar("w");
      checar("balao: W fecha balao", mundo.estado.balao_aberto, false);
      checar("balao: W com balao aberto nao chama aoNpc de novo", aoNpcChamados, []);
    }

    // fecharBalao diretamente (simula Esc no montar)
    {
      const { mundo } = novoMundoComNpcs();
      mundo.abrirBalao("ola", "");
      mundo.fecharBalao();
      checar("balao: fecharBalao fecha balao (simula Esc)", mundo.estado.balao_aberto, false);
    }

    // Prioridade: venue > NPC quando ambos no alcance
    {
      // bar em x=400; NPC em x=410; banda em inicioX=375 → centro=397
      // |397-400|=3 (venue perto); |397-410|=13 (npc perto) — venue vence
      const npcsProximos = [{ id: "npcx", x: 410, nome: "NPC junto da Venue", fala: "oi", item: "bandana_sortuda", dado: false }];
      const entrou2 = [], aoNpcProximo = [];
      const mundo = OW.criarMundo({
        agora: () => 0, agendarFrame: () => {}, ctx: null, inicioX: 375,
        venues: VENUES, itens: [], npcs: npcsProximos,
        aoEntrar: (v) => entrou2.push(v.id),
        aoNpc: (n) => aoNpcProximo.push(n.id),
      });
      checar("prioridade: venue_perto detectada", mundo.estado.venue_perto, "bar");
      checar("prioridade: npc_perto tambem detectado", mundo.estado.npc_perto, "npcx");
      mundo.pressionar("w");
      checar("prioridade: W entra na venue (venue > NPC)", entrou2, ["bar"]);
      checar("prioridade: aoNpc nao chamado quando venue no alcance", aoNpcProximo, []);
    }

    // ── MAP-01: van_estagio no estado() ────────────────────────────────────────

    // Estágio 1 (default / fama baixa)
    {
      const { mundo } = novoMundo();
      checar("van: estagio 1 (padrao sem vanEstagio)", mundo.estado.van_estagio, 1);
    }
    // Estágio 2 (injetado explicitamente)
    {
      const mundo = OW.criarMundo({
        agora: () => 0, agendarFrame: () => {}, ctx: null, inicioX: 60,
        venues: VENUES, itens: ITENS, vanEstagio: 2,
      });
      checar("van: estagio 2 refletido em estado()", mundo.estado.van_estagio, 2);
    }
    // Estágio 3 (injetado explicitamente)
    {
      const mundo = OW.criarMundo({
        agora: () => 0, agendarFrame: () => {}, ctx: null, inicioX: 60,
        venues: VENUES, itens: ITENS, vanEstagio: 3,
      });
      checar("van: estagio 3 refletido em estado()", mundo.estado.van_estagio, 3);
    }

    // ── Relatório ──────────────────────────────────────────────────────────────
    const ul = document.getElementById("casos");
    let todosOk = true;
    for (const c of casos) {
      if (!c.ok) todosOk = false;
      const li = document.createElement("li");
      li.className = c.ok ? "ok" : "falhou";
      li.textContent = (c.ok ? "PASS " : "FAIL ") + c.nome +
        (c.ok ? "" : ` | atual=${JSON.stringify(c.atual)} esperado=${JSON.stringify(c.esperado)}`);
      ul.appendChild(li);
    }
    const resumo = document.getElementById("resumo");
    resumo.textContent = todosOk
      ? `TODOS PASSARAM (${casos.length})`
      : `FALHAS: ${casos.filter((c) => !c.ok).length}/${casos.length}`;
    resumo.className = todosOk ? "ok" : "falhou";
    window.__testes = { ok: todosOk, total: casos.length, casos };
  })();
  </script>
</body>
</html>
