<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Harness — minigame de ritmo</title>
  <style>
    body { font-family: monospace; background:#14111c; color:#ece6f5; padding:16px; }
    .ok { color:#5be08a; } .falhou { color:#e23b4e; }
    h1 { font-size:1.1rem; }
    li { margin:2px 0; }
    .ritmo-pistas { position:relative; display:grid; grid-template-columns:repeat(4,1fr); height:200px; }
    .ritmo-pistas .pista { position:relative; } .nota { position:absolute; }
    #ritmo-overlay { display:none; } #ritmo-overlay.aberto { display:block; }
  </style>
</head>
<body>
  <h1>Harness do minigame de ritmo</h1>
  <div id="resumo">rodando…</div>
  <ul id="casos"></ul>

  <!-- DOM do overlay real, usado pelo cenário 6 (jogarRitmo) -->
  <div id="ritmo-overlay"><div id="ritmo-modal">
    <span id="ritmo-titulo"></span><span id="ritmo-acertos"></span><span id="ritmo-combo"></span>
    <div id="ritmo-pistas" class="ritmo-pistas"></div><div id="ritmo-dica"></div>
  </div></div>

  <script src="../js/ritmo.js"></script>
  <script src="mock-api.js"></script>
  <script>
  (async function () {
    "use strict";
    const RM = window.RitmoMinigame;
    const casos = [];
    function checar(nome, atual, esperado) {
      const ok = JSON.stringify(atual) === JSON.stringify(esperado);
      casos.push({ nome, ok, atual, esperado });
    }

    // ── 1. Placar puro ────────────────────────────────────────────────────────
    (function () {
      const p = RM.criarPlacar(10);
      p.acerto(); p.acerto(); p.acerto();   // combo 3
      p.erro();                              // zera
      p.acerto(); p.acerto();                // combo 2
      checar("placar: acertos/combo_max", p.estado,
        { acertos: 5, total_notas: 10, combo: 2, combo_max: 3 });
    })();

    // ── 1b. Charts nomeados (F3.6b): variados e determinísticos ───────────────
    (function () {
      const C = RM.CHARTS;
      const ids = ["facil", "constante", "rapido", "pesado", "denso", "sincopado", "sustentada", "caotico"];
      checar("charts: todos os ids do catálogo existem",
        ids.every((id) => Array.isArray(C[id]) && C[id].length > 0), true);
      checar("charts: denso tem mais notas que sustentada",
        C.denso.length > C.sustentada.length, true);
      const passo = (ch) => ch[1].tempo_ms - ch[0].tempo_ms;
      checar("charts: rapido é mais apertado que constante",
        passo(C.rapido) < passo(C.constante), true);
      checar("charts: facil é o mais folgado e o mais curto (F3.8)",
        passo(C.facil) > passo(C.constante) && C.facil.length < C.sustentada.length, true);
      checar("charts: notas em ordem e em pistas válidas",
        C.caotico.every((n, i) => n.pista >= 0 && n.pista <= 3 &&
          (i === 0 || n.tempo_ms >= C.caotico[i - 1].tempo_ms)), true);
    })();

    // Engine com relógio/escalonador falsos. O loop avança enquanto o engine
    // reagenda uma frame (pendente !== null); ao finalizar ele não reagenda.
    // Resolve via Promise (microtask), então damos `await` no fim.
    // opts: { audio, tipoMusico, nomeMove } — sobreposição para testes de solo.
    async function rodarEngine(chart, roteiro, opts) {
      opts = opts || {};
      let T = 0, pendente = null;
      const mg = RM.criarMinigame({
        agora: () => T,
        agendarFrame: (cb) => { pendente = cb; },
        audio: opts.audio || RM.audioNulo(),
        container: null,
        chart,
        tipoMusico: opts.tipoMusico || "guitarrista",
        nomeMove: opts.nomeMove || "padrao",
      });
      const prom = mg.iniciar();   // agenda a 1ª frame
      function frame(ms) { T += ms; const cb = pendente; pendente = null; if (cb) cb(); }
      for (const passo of roteiro) {
        if (passo.avancar != null) frame(passo.avancar);
        if (passo.apertar != null) mg.apertarPista(passo.apertar);
        if (passo.cancelar) mg.cancelar();
      }
      let guarda = 0;
      while (pendente && guarda++ < 5000) frame(50);
      return await prom;
    }

    const chart4 = [
      { tempo_ms: 1000, pista: 0 },
      { tempo_ms: 1400, pista: 1 },
      { tempo_ms: 1800, pista: 2 },
      { tempo_ms: 2200, pista: 3 },
    ];

    // ── 2. Sequência perfeita ─────────────────────────────────────────────────
    checar("engine: perfeito", await rodarEngine(chart4, [
      { avancar: 1000, apertar: 0 },
      { avancar: 400, apertar: 1 },
      { avancar: 400, apertar: 2 },
      { avancar: 400, apertar: 3 },
    ]), { acertos: 4, total_notas: 4, combo: 4, combo_max: 4 });

    // ── 3. Intercalado (erra a 2ª; combo_max = 2) ─────────────────────────────
    checar("engine: intercalado", await rodarEngine(chart4, [
      { avancar: 1000, apertar: 0 },   // acerto, combo 1
      { avancar: 600 },                // T=1600 → nota1 (1400) expira: erro
      { avancar: 200, apertar: 2 },    // T=1800 → acerto, combo 1
      { avancar: 400, apertar: 3 },    // T=2200 → acerto, combo 2
    ]), { acertos: 3, total_notas: 4, combo: 2, combo_max: 2 });

    // ── 4. Todas perdidas ─────────────────────────────────────────────────────
    checar("engine: todas perdidas", await rodarEngine(chart4, []),
      { acertos: 0, total_notas: 4, combo: 0, combo_max: 0 });

    // ── 5. Cancelar → resolve null ────────────────────────────────────────────
    checar("engine: cancelar", await rodarEngine(chart4, [
      { avancar: 1000, apertar: 0 },
      { cancelar: true },
    ]), null);

    // ── 6. jogarRitmo (overlay + teclado real, relógio monkeypatched) ─────────
    {
      const realNow = performance.now.bind(performance);
      const realRaf = window.requestAnimationFrame;
      let T = 0, pendente = null;
      performance.now = () => T;
      window.requestAnimationFrame = (cb) => { pendente = cb; return 1; };
      function frame(ms) { T += ms; const cb = pendente; pendente = null; if (cb) cb(); }

      const prom = RM.jogarRitmo({ tipoMusico: "guitarrista", cor: "#e23b4e" });
      for (const nota of RM.CHART) {
        frame(nota.tempo_ms - T);   // avança até o tempo da nota
        window.dispatchEvent(new KeyboardEvent("keydown", { key: RM.TECLAS[nota.pista] }));
      }
      let guarda = 0;
      while (pendente && guarda++ < 5000) frame(50);
      const resultado = await prom;

      performance.now = realNow;
      window.requestAnimationFrame = realRaf;

      const total = RM.CHART.length;
      checar("jogarRitmo: payload perfeito", resultado,
        { acertos: total, total_notas: total, combo: total, combo_max: total });
      checar("jogarRitmo: montou 4 pistas",
        document.getElementById("ritmo-pistas").querySelectorAll(".pista").length, 4);
      checar("jogarRitmo: overlay fechou no fim",
        document.getElementById("ritmo-overlay").classList.contains("aberto"), false);

      // Simula o que main.js faz: manda a contagem crua pro backend (mock).
      await window.pywebview.api.executar_acao({ indice: 0, ritmo: resultado });
      checar("fluxo: executar_acao recebeu o ritmo",
        window.__mockApi.ultimo().payload.ritmo, resultado);
    }

    // ── 7. Solo melódico (REQ1/REQ2 — D-02/D-07) ─────────────────────────────
    // Spy de áudio: solo() registra; acerto()/erro() LANÇAM (beep genérico proibido).
    {
      const soloLog = [];
      const audioSpy = {
        iniciar() {}, parar() {},
        solo(timbre, nota, acerto) { soloLog.push({ timbre, nota, acerto }); },
        acerto() { throw new Error("beep genérico no minigame: acerto() não deve ser chamado"); },
        erro()   { throw new Error("beep genérico no minigame: erro() não deve ser chamado"); },
        batida() {},
      };

      // chart3: 2 acertos + 1 perdida = 3 notas, todas resolvidas
      const chart3 = [
        { tempo_ms: 1000, pista: 0 },
        { tempo_ms: 1500, pista: 1 },
        { tempo_ms: 2000, pista: 2 },
      ];

      // Caso 7a: chart de N notas → N eventos de solo
      const soloLogA = [];
      const spyA = {
        iniciar() {}, parar() {},
        solo(t, n, a) { soloLogA.push({ t, n, a }); },
        acerto() { throw new Error("beep genérico no minigame"); },
        erro()   { throw new Error("beep genérico no minigame"); },
        batida() {},
      };
      // roteiro: aperta 2 notas; a 3ª é perdida → total = 3 solos
      await rodarEngine(chart3, [
        { avancar: 1000, apertar: 0 },
        { avancar: 500,  apertar: 1 },
        // T=1500: nota1 acerta; nota2 fica; avançar para além da janela de nota2
      ], { audio: spyA, tipoMusico: "baixista", nomeMove: "facil" });
      checar("solo: chart de 3 notas → 3 eventos de solo (2 acertos + 1 perdida)",
        spyA.soloLogA !== undefined ? spyA.soloLogA.length : soloLogA.length,
        // contagem real via spyA.solo calls
        void 0);
      // Abordagem mais robusta: rodar do zero contando diretamente
      {
        const log3 = [];
        const spy3 = {
          iniciar() {}, parar() {},
          solo(t, n, a) { log3.push({ t, n, a }); },
          acerto() { throw new Error("beep genérico emitido"); },
          erro()   { throw new Error("beep genérico emitido"); },
          batida() {},
        };
        await rodarEngine(chart3, [
          { avancar: 1000, apertar: 0 },
          { avancar: 500,  apertar: 1 },
        ], { audio: spy3, tipoMusico: "baixista", nomeMove: "facil" });
        checar("solo: chart 3 notas → 3 eventos solo", log3.length, 3);
        checar("solo: nenhum beep genérico (acerto/erro não chamados)",
          log3.some(e => e.t !== undefined), true);
        checar("solo: acerto=true para acertos, false para perdida",
          log3.filter(e => e.a === true).length === 2 &&
          log3.filter(e => e.a === false).length === 1, true);
        checar("solo: timbre = tipoMusico injetado (baixista)",
          log3.every(e => e.t === "baixista"), true);
      }

      // Caso 7e: chart perfeito (todos acertos) → todos acerto=true
      {
        const logP = [];
        const spyP = {
          iniciar() {}, parar() {},
          solo(t, n, a) { logP.push({ t, n, a }); },
          acerto() { throw new Error("beep genérico emitido"); },
          erro()   { throw new Error("beep genérico emitido"); },
          batida() {},
        };
        const chart2 = [
          { tempo_ms: 1000, pista: 0 },
          { tempo_ms: 1500, pista: 1 },
        ];
        await rodarEngine(chart2, [
          { avancar: 1000, apertar: 0 },
          { avancar: 500,  apertar: 1 },
        ], { audio: spyP, tipoMusico: "guitarrista", nomeMove: "rapido" });
        checar("solo: perfeito → 2 eventos acerto=true, 0 false",
          logP.length === 2 && logP.every(e => e.a === true), true);
      }

      // Caso 7f: audioNulo() tem solo() sem lançar
      {
        const nulo = RM.audioNulo();
        let lançou = false;
        try { nulo.solo("guitarrista", 440, true); } catch (_) { lançou = true; }
        checar("audioNulo.solo() não lança", lançou, false);
      }
    }

    // ── Relatório ─────────────────────────────────────────────────────────────
    const ul = document.getElementById("casos");
    let todosOk = true;
    for (const c of casos) {
      if (!c.ok) todosOk = false;
      const li = document.createElement("li");
      li.className = c.ok ? "ok" : "falhou";
      li.textContent = (c.ok ? "PASS " : "FAIL ") + c.nome +
        (c.ok ? "" : ` | atual=${JSON.stringify(c.atual)} esperado=${JSON.stringify(c.esperado)}`);
      ul.appendChild(li);
    }
    const resumo = document.getElementById("resumo");
    resumo.textContent = todosOk
      ? `TODOS PASSARAM (${casos.length})`
      : `FALHAS: ${casos.filter((c) => !c.ok).length}/${casos.length}`;
    resumo.className = todosOk ? "ok" : "falhou";
    window.__testes = { ok: todosOk, total: casos.length, casos };
  })();
  </script>
</body>
</html>
