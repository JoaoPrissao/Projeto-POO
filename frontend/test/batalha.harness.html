<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Harness — batalha (arena MK)</title>
  <style>
    body { font-family: monospace; background:#14111c; color:#ece6f5; padding:16px; }
    .ok { color:#5be08a; } .falhou { color:#e23b4e; }
    h1 { font-size:1.1rem; } li { margin:2px 0; }
  </style>
</head>
<body>
  <h1>Harness da batalha (arena MK)</h1>
  <div id="resumo">rodando…</div>
  <ul id="casos"></ul>

  <script src="../js/batalha.js"></script>
  <script>
  (async function () {
    "use strict";
    const B = window.Batalha;
    const IDLE = B.CONFIG.IDLE_MS;            // F3.8: banda parada → ataque grátis
    const VDELAY = B.CONFIG.VILAO_DELAY_MS;   // F3.8: pausa antes do revide
    const INTRO = B.CONFIG.INTRO_BANDA_MS + B.CONFIG.INTRO_VILAO_MS + B.CONFIG.INTRO_FIGHT_MS;
    const casos = [];
    const clone = (o) => JSON.parse(JSON.stringify(o));
    function checar(nome, atual, esperado) {
      casos.push({ nome, ok: JSON.stringify(atual) === JSON.stringify(esperado), atual, esperado });
    }

    function membro(id, tipo, nome, hp, vivo) {
      return { id, tipo, nome, nivel: 1, hp, hp_maximo: 100, xp: 0,
               vivo: vivo !== false, cansado: false, energia: 100, energia_maxima: 100,
               recurso: { tipo: null, valor: 0, max: null } };
    }
    function estadoBase(over) {
      return Object.assign({
        banda: [
          membro(0, "guitarrista", "Aldric", 100),
          membro(1, "vocalista", "Selene", 100),
          membro(2, "baixista", "Paul", 100),
        ],
        boss: { id: "empresario", nome: "Capanga", hp: 90, hp_maximo: 90 },
        turno: "banda", fim_de_jogo: false, resultado: null,
      }, over || {});
    }

    // API fake determinística: espelha o contrato F3.4/F3.8 (stun consome a vez
    // do vilão; a vez dele DESCANSA a banda). Mexe no `estado` e devolve clones.
    function fakeApi(estado, opts) {
      opts = opts || {};
      const chamadas = [];
      let perfeitos = 0;
      let atordoado = false;
      return {
        chamadas,
        executar_acao(p) {
          chamadas.push(["executar_acao", p]);
          estado.boss.hp = Math.max(0, estado.boss.hp - (opts.danoBoss || 30));
          const fim = estado.boss.hp <= 0 ? "vitoria" : null;
          const r = p && p.ritmo;
          const perfeito = !!(r && r.acertos >= r.total_notas);
          if (perfeito) { perfeitos += 1; atordoado = true; } else { perfeitos = 0; }
          estado.fim_de_jogo = !!fim; estado.resultado = fim; estado.turno = "boss";
          return Promise.resolve({ ok: true, dano: opts.danoBoss || 30, critico: false,
            modo_refrao_ativo: false, perfeito, atordoado,
            perfeitos_seguidos: perfeitos, especial_disponivel: perfeitos >= 4,
            atacante: "fake",
            estado: clone(estado), fim_de_jogo: !!fim, resultado_final: fim });
        },
        ataque_especial() {
          chamadas.push(["ataque_especial"]);
          if (perfeitos < 4) {
            return Promise.resolve({ ok: false,
              erro: { tipo: "EspecialIndisponivelError", mensagem: "especial indisponível" } });
          }
          perfeitos = 0;
          estado.boss.hp = Math.max(0, estado.boss.hp - (opts.danoEspecial || 120));
          const fim = estado.boss.hp <= 0 ? "vitoria" : null;
          estado.fim_de_jogo = !!fim; estado.resultado = fim;
          return Promise.resolve({ ok: true, dano: opts.danoEspecial || 120,
            atacante: "Banda (especial)", por_membro: [],
            estado: clone(estado), fim_de_jogo: !!fim, resultado_final: fim });
        },
        turno_inimigo() {
          chamadas.push(["turno_inimigo"]);
          estado.banda.forEach((x) => { x.cansado = false; });   // F3.8: rodada vira
          if (atordoado) {
            atordoado = false;
            return Promise.resolve({ ok: true, atacante: estado.boss.nome, alvo: null,
              dano: 0, atordoado: true, estado: clone(estado),
              fim_de_jogo: false, resultado_final: null });
          }
          const i = opts.alvo != null ? opts.alvo : 0;
          const m = estado.banda[i];
          if (m) { m.hp = Math.max(0, m.hp - (opts.danoMembro || 20)); m.vivo = m.hp > 0; }
          const fim = estado.banda.every((x) => !x.vivo) ? "derrota" : null;
          estado.fim_de_jogo = !!fim; estado.resultado = fim; estado.turno = "banda";
          return Promise.resolve({ ok: true, atacante: estado.boss.nome,
            alvo: m ? m.nome : null, dano: opts.danoMembro || 20, atordoado: false,
            estado: clone(estado), fim_de_jogo: !!fim, resultado_final: fim });
        },
      };
    }

    const ritmoOk = () => Promise.resolve({ acertos: 8, total_notas: 10, combo_max: 5 });
    const ritmoPerfeito = () => Promise.resolve({ acertos: 10, total_notas: 10, combo_max: 10 });
    const ritmoCancel = () => Promise.resolve(null);

    // Por padrão pula a intro (testes do combate); `comIntro: true` mantém.
    function mk(estado, o) {
      o = o || {};
      const b = B.criarBatalha({
        ctx: null, estado, api: o.api, jogarRitmo: o.jogarRitmo || ritmoOk,
        aoFim: o.aoFim || function () {}, aoAtualizar: o.aoAtualizar || function () {},
        aoPausar: o.aoPausar, aoLuta: o.aoLuta, aoSelecionar: o.aoSelecionar,
      });
      if (!o.comIntro) b.pularIntro();
      return b;
    }
    // Ataca e deixa o vilão revidar (turno completo: banda → vilão → banda).
    async function atacarERevidar(b, moveIdx) {
      await b.atacar(moveIdx);
      await b.passo(VDELAY);
    }

    // ── 1. Estado inicial: banda + boss + seleção no 1º vivo ───────────────────
    {
      const est = estadoBase();
      const b = mk(est, { api: fakeApi(est) });
      checar("init: 3 membros na banda", b.estado.banda.length, 3);
      checar("init: boss presente", b.estado.boss.nome, "Capanga");
      checar("init: seleciona o 1º vivo", b.selecionado, 0);
      checar("init: fase luta após pular a intro", b.fase, "luta");
      checar("init: começa na vez da banda", b.turno, "banda");
    }

    // ── 2. Intro coreografada: fase inicial, input bloqueado, avança por tempo ─
    {
      const est = estadoBase();
      const api = fakeApi(est);
      const b = mk(est, { api, comIntro: true });
      checar("intro: fase começa em intro", b.fase, "intro");
      await b.atacar();
      checar("intro: ataque ignorado durante a intro", api.chamadas.length, 0);
      await b.passo(INTRO - 1);
      checar("intro: ainda em intro antes do tempo", b.fase, "intro");
      await b.passo(1);
      checar("intro: vira luta quando o tempo fecha", b.fase, "luta");
    }
    {
      const est = estadoBase();
      const b = mk(est, { api: fakeApi(est), comIntro: true });
      b.pularIntro();
      checar("intro: pularIntro vai direto pra luta", b.fase, "luta");
    }

    // ── 3. Seleção anda entre vivos (com wrap) ─────────────────────────────────
    {
      const est = estadoBase();
      const b = mk(est, { api: fakeApi(est) });
      b.selecionar(1); checar("sel: →1", b.selecionado, 1);
      b.selecionar(1); checar("sel: →2", b.selecionado, 2);
      b.selecionar(1); checar("sel: dá a volta p/ 0", b.selecionado, 0);
      b.selecionar(-1); checar("sel: ←2 (wrap pra trás)", b.selecionado, 2);
    }

    // ── 4. Seleção pula membro nocauteado E cansado (F3.8) ─────────────────────
    {
      const est = estadoBase({ banda: [
        membro(0, "guitarrista", "Aldric", 100),
        membro(1, "vocalista", "Selene", 0, false),  // KO
        membro(2, "baixista", "Paul", 100),
      ] });
      const b = mk(est, { api: fakeApi(est) });
      b.selecionar(1); checar("sel: pula o KO (0→2)", b.selecionado, 2);
    }
    {
      const est = estadoBase();
      est.banda[1].cansado = true;                   // 💤 perdeu a vez
      const b = mk(est, { api: fakeApi(est) });
      b.selecionar(1); checar("sel: pula o cansado (0→2)", b.selecionado, 2);
      b.selecionarIndice(1);
      checar("sel: clique no cansado não seleciona", b.selecionado, 2);
    }

    // ── 5. Turno revezado: banda ataca → vez do vilão → volta pra banda ────────
    {
      const est = estadoBase();
      const api = fakeApi(est, { alvo: 0, danoMembro: 20 });
      const b = mk(est, { api });
      b.selecionarIndice(2);
      await b.atacar();
      const ult = api.chamadas.find((c) => c[0] === "executar_acao");
      checar("turno: executar_acao com indice=2", ult[1].indice, 2);
      checar("turno: HP do boss caiu", b.estado.boss.hp, 60);   // 90 - 30
      checar("turno: golpe passa a vez pro vilão", b.turno, "vilao");
      await b.atacar();
      checar("turno: banda NÃO ataca na vez do vilão",
        api.chamadas.filter((c) => c[0] === "executar_acao").length, 1);
      await b.passo(VDELAY - 1);
      checar("turno: vilão espera o delay dramático",
        api.chamadas.filter((c) => c[0] === "turno_inimigo").length, 0);
      await b.passo(1);
      checar("turno: vilão revidou após o delay",
        api.chamadas.filter((c) => c[0] === "turno_inimigo").length, 1);
      checar("turno: revide bateu na banda", b.estado.banda[0].hp, 80);
      checar("turno: a vez volta pra banda", b.turno, "banda");
      await b.atacar();
      checar("turno: banda pode atacar de novo",
        api.chamadas.filter((c) => c[0] === "executar_acao").length, 2);
    }

    // ── 6. Ociosidade: banda parada 10s → vilão ataca DE GRAÇA ─────────────────
    {
      const est = estadoBase();
      const api = fakeApi(est, { alvo: 0, danoMembro: 20 });
      const b = mk(est, { api });
      await b.passo(IDLE - 1);
      checar("idle: nada antes dos 10s", api.chamadas.length, 0);
      await b.passo(1);
      checar("idle: vilão atacou de graça",
        api.chamadas.filter((c) => c[0] === "turno_inimigo").length, 1);
      checar("idle: HP de um membro caiu", b.estado.banda[0].hp, 80);
      checar("idle: a vez segue da banda", b.turno, "banda");
      checar("idle: relógio rearmado", b.timerIdle, IDLE);
    }

    // ── 7. Relógios congelam enquanto o minigame está aberto (ocupado) ─────────
    {
      const est = estadoBase();
      const api = fakeApi(est);
      let resolver;
      const lento = () => new Promise((r) => { resolver = r; });
      const b = mk(est, { api, jogarRitmo: lento });
      const p1 = b.atacar();                  // trava no minigame (ocupado)
      await b.passo(IDLE * 3);
      checar("ocupado: vilão não age durante o minigame",
        api.chamadas.filter((c) => c[0] === "turno_inimigo").length, 0);
      resolver({ acertos: 8, total_notas: 10, combo_max: 5 });
      await p1;
      checar("ocupado: ataque resolveu depois", b.estado.boss.hp, 60);
    }

    // ── 8. Esc no minigame (null) não gasta a vez ──────────────────────────────
    {
      const est = estadoBase();
      const api = fakeApi(est);
      const b = mk(est, { api, jogarRitmo: ritmoCancel });
      await b.atacar();
      checar("cancela: nenhum executar_acao", api.chamadas.length, 0);
      checar("cancela: boss intacto", b.estado.boss.hp, 90);
      checar("cancela: a vez continua da banda", b.turno, "banda");
    }

    // ── 9. Stun: perfeito atordoa; a vez do vilão é CONSUMIDA pelo stun ────────
    {
      const est = estadoBase();
      const api = fakeApi(est, { alvo: 0, danoMembro: 20 });
      const b = mk(est, { api, jogarRitmo: ritmoPerfeito });
      await b.atacar();
      checar("stun: perfeito liga o visual de atordoado", b.bossAtordoado, true);
      checar("stun: perfeitos seguidos = 1", b.perfeitosSeguidos, 1);
      checar("stun: a vez do vilão acontece mesmo com stun", b.turno, "vilao");
      await b.passo(VDELAY);
      checar("stun: vilão perdeu a vez (sem dano)", b.estado.banda[0].hp, 100);
      checar("stun: visual limpo após a vez perdida", b.bossAtordoado, false);
      await b.passo(IDLE);                    // banda enrolou: agora ele bate
      checar("stun: no ataque grátis seguinte ele bate de novo", b.estado.banda[0].hp, 80);
    }

    // ── 10. Cansaço (F3.8): golpe pesado tira o músico da próxima vez ──────────
    {
      const est = estadoBase();
      est.banda[0].cansado = true;            // backend marcou após golpe pesado
      const api = fakeApi(est, { alvo: 1, danoMembro: 5 });
      const b = mk(est, { api });
      checar("cansado: seleção inicial pula o cansado", b.selecionado, 1);
      b.selecionarIndice(0);
      checar("cansado: não dá pra selecionar", b.selecionado, 1);
      await b.passo(IDLE);                    // ataque grátis: a rodada vira
      checar("cansado: a vez do vilão descansa o músico",
        b.estado.banda[0].cansado, false);
    }

    // ── 11. Sem energia: o golpe nem chama a API ───────────────────────────────
    {
      const est = estadoBase();
      est.banda[0].moves = [{ id: "riff_pesado", nome: "Riff Pesado", mult: 1.5,
                              custo: 25, cansa: true, chart: "pesado" }];
      est.banda[0].energia = 10;              // não paga o custo de 25
      const api = fakeApi(est);
      const b = mk(est, { api });
      await b.atacar(0);
      checar("energia: sem energia não chama executar_acao", api.chamadas.length, 0);
      checar("energia: a vez continua da banda", b.turno, "banda");
    }

    // ── 12. Especial: só com 4 perfeitos; espaço gasta e passa a vez ───────────
    {
      const est = estadoBase({ boss: { id: "e", nome: "Tanque", hp: 900, hp_maximo: 900 } });
      const api = fakeApi(est, { danoBoss: 10, danoEspecial: 150 });
      const lutas = [];
      const b = mk(est, { api, jogarRitmo: ritmoPerfeito,
                          aoLuta: (i) => lutas.push(clone(i)) });
      await b.especial();
      checar("especial: sem flag não chama a API",
        api.chamadas.filter((c) => c[0] === "ataque_especial").length, 0);
      for (let k = 0; k < 4; k++) await atacarERevidar(b);   // 4 perfeitos seguidos
      checar("especial: liberado após 4 perfeitos", b.especialDisponivel, true);
      checar("especial: aoLuta avisou o HUD",
        lutas.some((i) => i.especialDisponivel === true), true);
      checar("especial: aoLuta expõe o turno",
        lutas.some((i) => i.turno === "vilao") && lutas.some((i) => i.turno === "banda"), true);
      await b.especial();
      checar("especial: chamou ataque_especial",
        api.chamadas.filter((c) => c[0] === "ataque_especial").length, 1);
      checar("especial: dano aplicado no boss", b.estado.boss.hp, 900 - 40 - 150);
      checar("especial: flag consumida", b.especialDisponivel, false);
      checar("especial: passa a vez pro vilão", b.turno, "vilao");
    }

    // ── 13. Vitória pelo especial encerra a luta ───────────────────────────────
    {
      const est = estadoBase({ boss: { id: "e", nome: "Quase", hp: 200, hp_maximo: 200 } });
      const api = fakeApi(est, { danoBoss: 10, danoEspecial: 500 });
      let fim = null;
      const b = mk(est, { api, jogarRitmo: ritmoPerfeito, aoFim: (r) => { fim = r; } });
      for (let k = 0; k < 4; k++) await atacarERevidar(b);
      await b.especial();
      checar("vitória especial: aoFim('vitoria')", fim, "vitoria");
      checar("vitória especial: fase fim", b.fase, "fim");
    }

    // ── 14. Pausa: congela os relógios e bloqueia até retomar ──────────────────
    {
      const est = estadoBase();
      const api = fakeApi(est, { alvo: 0, danoMembro: 20 });
      let pausas = 0;
      const b = mk(est, { api, aoPausar: () => { pausas += 1; } });
      b.pausar();
      checar("pausa: fase pausa", b.fase, "pausa");
      checar("pausa: aoPausar avisado", pausas, 1);
      await b.passo(IDLE * 4);
      checar("pausa: vilão não age pausado",
        api.chamadas.filter((c) => c[0] === "turno_inimigo").length, 0);
      await b.atacar();
      checar("pausa: ataque bloqueado", api.chamadas.length, 0);
      b.retomar();
      checar("pausa: retomar volta pra luta", b.fase, "luta");
      await b.passo(IDLE);
      checar("pausa: relógio volta a andar",
        api.chamadas.filter((c) => c[0] === "turno_inimigo").length, 1);
    }

    // ── 15. Pausa não entra durante o minigame (Esc é do modal) ────────────────
    {
      const est = estadoBase();
      const api = fakeApi(est);
      let resolver;
      const lento = () => new Promise((r) => { resolver = r; });
      const b = mk(est, { api, jogarRitmo: lento });
      const p1 = b.atacar();
      b.pausar();
      checar("pausa: ignorada com o minigame aberto", b.fase, "luta");
      resolver(null);
      await p1;
    }

    // ── 16. Vitória pelo ataque normal: aoFim e relógios mortos ────────────────
    {
      const est = estadoBase({ boss: { id: "e", nome: "Fraco", hp: 30, hp_maximo: 30 } });
      const api = fakeApi(est, { danoBoss: 30 });
      let fim = null;
      const b = mk(est, { api, aoFim: (r) => { fim = r; } });
      await b.atacar();
      checar("vitória: aoFim('vitoria')", fim, "vitoria");
      await b.passo(IDLE * 2);
      checar("vitória: vilão morto não age",
        api.chamadas.some((c) => c[0] === "turno_inimigo"), false);
    }

    // ── 17. Derrota pelo ataque grátis chama aoFim('derrota') ──────────────────
    {
      const est = estadoBase({
        banda: [membro(0, "guitarrista", "Aldric", 20)],
        boss: { id: "e", nome: "Forte", hp: 500, hp_maximo: 500 },
      });
      const api = fakeApi(est, { alvo: 0, danoMembro: 20 });
      let fim = null;
      const b = mk(est, { api, aoFim: (r) => { fim = r; } });
      await b.passo(IDLE);                    // ataque grátis mata o último
      checar("derrota: aoFim('derrota')", fim, "derrota");
      checar("derrota: fase fim", b.fase, "fim");
    }

    // ── 18. Reentrância: 2º ataque é ignorado enquanto ocupado ─────────────────
    {
      const est = estadoBase();
      const api = fakeApi(est);
      let resolver;
      const lento = () => new Promise((r) => { resolver = r; });
      const b = mk(est, { api, jogarRitmo: lento });
      const p1 = b.atacar();
      checar("ocupado: flag durante o ataque", b.ocupado, true);
      b.atacar();
      resolver({ acertos: 8, total_notas: 10, combo_max: 5 });
      await p1;
      checar("ocupado: só 1 executar_acao",
        api.chamadas.filter((c) => c[0] === "executar_acao").length, 1);
    }

    // ── 19. Moves (F3.6b/F3.8): move escolhido vira move_id + chart no minigame ─
    {
      const MOVES = [
        { id: "palhetada", nome: "Palhetada", mult: 0.8, custo: 5, cansa: false, chart: "facil" },
        { id: "riff_pesado", nome: "Riff Pesado", mult: 1.5, custo: 25, cansa: true, chart: "pesado" },
        { id: "solo_distorcido", nome: "Solo Distorcido", mult: 1.6, custo: 28, cansa: true, chart: "caotico" },
      ];
      const est = estadoBase();
      est.banda[0].moves = MOVES;
      const api = fakeApi(est);
      const charts = [];
      const ritmoSpy = (o) => { charts.push(o && o.chart); return ritmoOk(); };
      const b = mk(est, { api, jogarRitmo: ritmoSpy });
      await atacarERevidar(b, 1);                 // move 2 (riff_pesado)
      const chamada = api.chamadas.find((c) => c[0] === "executar_acao");
      checar("move: payload leva move_id", chamada[1].move_id, "riff_pesado");
      checar("move: minigame recebe o chart do move", charts[0], "pesado");
      await b.atacar(9);                          // índice fora do moveset → move 1
      const c2 = api.chamadas.filter((c) => c[0] === "executar_acao")[1];
      checar("move: índice inválido cai no move 1", c2[1].move_id, "palhetada");
    }
    {
      const est = estadoBase();                   // membro SEM moves (compat)
      const api = fakeApi(est);
      const charts = [];
      const ritmoSpy = (o) => { charts.push(o && o.chart); return ritmoOk(); };
      const b = mk(est, { api, jogarRitmo: ritmoSpy });
      await b.atacar();
      const chamada = api.chamadas.find((c) => c[0] === "executar_acao");
      checar("move: sem moveset não manda move_id", "move_id" in chamada[1], false);
      checar("move: sem moveset usa chart padrão", charts[0], undefined);
    }
    {
      const MOVES = [{ id: "solo_rapido", nome: "Solo", mult: 1.0, custo: 12, cansa: false, chart: "rapido" }];
      const est = estadoBase();
      est.banda[1].moves = MOVES;
      const vistos = [];
      const b = mk(est, { api: fakeApi(est), aoSelecionar: (m) => vistos.push(m && m.nome) });
      b.selecionar(1);                            // vai pro membro 1 (Selene)
      checar("move: aoSelecionar avisa o HUD do membro novo",
        vistos[vistos.length - 1], "Selene");
    }

    // ── 20. aoAtualizar recebe o estado novo (hook do HUD) ─────────────────────
    {
      const est = estadoBase();
      const api = fakeApi(est);
      const vistos = [];
      const b = mk(est, { api, aoAtualizar: (e) => vistos.push(e.boss.hp) });
      await b.atacar();
      checar("hud: aoAtualizar viu o boss com HP menor",
        vistos[vistos.length - 1] < 90, true);
    }

    // ── Relatório ──────────────────────────────────────────────────────────────
    const ul = document.getElementById("casos");
    let todosOk = true;
    for (const c of casos) {
      if (!c.ok) todosOk = false;
      const li = document.createElement("li");
      li.className = c.ok ? "ok" : "falhou";
      li.textContent = (c.ok ? "PASS " : "FAIL ") + c.nome +
        (c.ok ? "" : ` | atual=${JSON.stringify(c.atual)} esperado=${JSON.stringify(c.esperado)}`);
      ul.appendChild(li);
    }
    const resumo = document.getElementById("resumo");
    resumo.textContent = todosOk ? `TODOS PASSARAM (${casos.length})`
                                 : `FALHAS: ${casos.filter((c) => !c.ok).length}/${casos.length}`;
    resumo.className = todosOk ? "ok" : "falhou";
    window.__testes = { ok: todosOk, total: casos.length, casos };
  })();
  </script>
</body>
</html>
