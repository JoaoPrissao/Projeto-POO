<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Manager — A Banda</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
  <header>
    <h1>🎸 RPG Manager <span class="sub">— a turnê contra O Empresário</span></h1>
  </header>

  <main>
    <!-- ── Tela 1: Overworld (mapa side-scroll) ──────────────────────────── -->
    <section id="tela-overworld" class="tela ativa">
      <div id="overworld-hud" class="painel">
        <span id="ow-dica"><b>A</b>/<b>D</b> anda · <b>W</b> entra na venue · ande por cima dos itens</span>
        <span id="ow-aviso" class="ow-aviso"></span>
      </div>
      <div class="overworld-palco">
        <canvas id="overworld-canvas"></canvas>
      </div>
    </section>

    <!-- ── Tela 2: Show (batalha de ritmo — reusada da F2/F3.1) ───────────── -->
    <section id="tela-show" class="tela">
      <!-- Boss -->
      <section id="boss-area" class="painel">
        <h2 id="boss-nome">O Empresário</h2>
        <div class="barra barra-boss">
          <div id="boss-hp-fill" class="fill"></div>
          <span id="boss-hp-label" class="barra-label">—</span>
        </div>
      </section>

      <!-- Log de eventos -->
      <section id="log-area" class="painel">
        <p id="log" class="log">Monte a banda para começar o show.</p>
      </section>

      <!-- Banda -->
      <section id="banda-area">
        <div id="banda" class="banda"></div>
      </section>

      <!-- Controles -->
      <section id="controles" class="painel">
        <button id="btn-voltar-mapa" hidden>← Voltar ao mapa</button>
        <button id="btn-turno-inimigo" disabled>Turno do Empresário</button>
        <button id="btn-salvar" disabled>Salvar</button>
        <button id="btn-carregar">Carregar</button>
        <button id="btn-banda-demo" hidden>Montar banda demo</button>
      </section>
    </section>
  </main>

  <!-- Overlay do minigame de ritmo (oculto até clicar num músico) -->
  <div id="ritmo-overlay">
    <div id="ritmo-modal">
      <div id="ritmo-cabecalho">
        <span id="ritmo-titulo">Ritmo</span>
        <span id="ritmo-acertos" class="ritmo-hud">0/0</span>
        <span id="ritmo-combo" class="ritmo-hud">Combo 0</span>
      </div>
      <div id="ritmo-pistas" class="ritmo-pistas"></div>
      <div id="ritmo-dica">Acerte no tempo: <b>D F J K</b> (ou clique na pista). <b>Esc</b> cancela.</div>
    </div>
  </div>

  <script src="js/audio.js"></script>
  <script src="js/ritmo.js"></script>
  <script src="js/overworld.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
